<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Updates - STC IISER TVM</title>
    
    <!-- Universal Path Fixer Script -->
    <script src="../js/universal-path-fixer.js" onerror="console.warn('Universal path fixer failed to load')"></script>
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="../css/mobile.css">
</head>
<body>    
    <!-- navbar-->
     <div id="navbar-container"></div>

    <main>
        <section class="page-header">
            <div class="container">
                <h1>Updates & Announcements</h1>
                <p>Stay informed with the latest news from the STC.</p>
            </div>
        </section>

        <section id="updates-page" class="container">
            <div id="updates-list-container" class="updates-list">
                <!-- Updates are loaded dynamically from js/data.js -->
            </div>
        </section>
    </main>

    <footer id="footer-container"></footer>

    <script>writeFixedJS("../js/script.js");</script>
    <script>writeFixedJS("script.js");</script>

    <!-- JavaScript Files -->
    
    <!-- Load and fix footer content -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Load footer content
            const footerContainer = document.getElementById('footer-container');
            if (footerContainer && window.fixPath) {
                const footerPath = window.fixPath('../footer.html');
                fetch(footerPath)
                    .then(response => response.text())
                    .then(html => {
                        footerContainer.innerHTML = html;
                        // Fix footer links after loading
                        if (window.fixDynamicContent) {
                            setTimeout(window.fixDynamicContent, 100);
                        }
                    })
                    .catch(error => {
                        console.warn('Footer loading failed:', error);
                    });
            }
        });
    </script>
</body>
</html>
